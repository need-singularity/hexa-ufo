[package]
name = "hexa-ufo"
version = "1.0.0"
entry = "cli/hexa-ufo.hexa"
description = "UFO Substrate Atlas + 7-stage Propulsion (grav/hover/cloak/teleport/sim/warp/wormhole/dimjump/dimuse). alien_index рҹӣё6 вҶ’ рҹӣё16 metaВІ вҶ’ рҹӣёвҲһвҒҙ вҶ’ рҹӣёULTRA вҶ’ рҹӣёCARD вҶ’ рҹӣёBEYOND вҶ’ рҹӣёABSOLUTE = рқ”ҡ (n=6 substrate вҶ’ metaВІ self-closure вҶ’ Knuth-arrow tetration вҶ’ uncomputable вҶ’ large cardinals вҶ’ Kunen-violating вҶ’ Cantor рқ”ҡ). 1890-LOC main atlas + 10 propulsion verbs. Stage-1 Meissner / Stage-2 fusion / Stage-3 antimatter cross-link to public sister repos; Stage-4 warp / Stage-5 wormhole / Stage-6 dim-jump / Stage-7 dim-use ship as IN-TREE spec docs with 13 falsifier preregister (F-WARP/F-WORM/F-DIM/F-USE). Each stage academically UNPROVEN вҖ” sentinel PASS вү  empirical PASS."
license = "MIT"
authors = ["л°•лҜјмҡ° <nerve011235@gmail.com>"]
repository = "https://github.com/dancinlab/hexa-ufo"
homepage = "https://github.com/dancinlab/hexa-ufo"
readme = "README.md"
keywords = ["ufo", "propulsion", "alien-index", "alcubierre", "wormhole", "meissner", "fusion", "antimatter", "n6-invariant"]
categories = ["science-fiction", "speculative-engineering", "propulsion", "atlas"]

[lib]
# Library entry вҖ” atlas browser placeholder (read-only).
entry = "ufo/module/ufo_nexus_scan.hexa"

[[bin]]
name = "hexa-ufo"
path = "cli/hexa-ufo.hexa"

[test]
runner = "hexa"
files = [
    "tests/test_atlas_consistency.hexa",
    "tests/test_stages_propulsion.hexa",
]

# в”Җв”Җ hx install hook в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# install.hexa runs under hx package manager (hexa-lang) at install time.
# Phases: pre   вҶ’ none required (pure-text atlas + stub modules).
#         post  вҶ’ quick atlas-consistency selftest (warn-only, not a blocker).
[scripts]
install = "install.hexa"

# в”Җв”Җ Modules manifest (1 atlas + 10 propulsion verbs + 3 verify scripts) в”Җв”Җв”Җ
# ufo                    вҖ” main atlas (1890 LOC narrative + 484-tier L(k)=24^(k-15) table)
# grav/hover/cloak/teleport/sim вҖ” 5 propulsion sub-axis docs (atlas pattern)
# warp/wormhole/dimjump/dimuse  вҖ” 4 in-tree Stage-4~7 substrate spec docs (medium-integration 2026-05-07)
# verify/                вҖ” runnable invariant audits (lattice + stages_cross_doc + stages_falsifier)
[modules]
hexa = [
    "ufo/module/ufo_nexus_scan.hexa",
    "verify/lattice_check.hexa",
    "verify/stages_cross_doc.hexa",
    "verify/stages_falsifier.hexa",
    "verify/calc_warp.hexa",
    "verify/run_all.hexa",
]
docs = [
    "ufo/doc/hexa-ufo.md",
    "ufo/doc/warp-dimension-design.md",
    "grav/hexa-grav.md",
    "hover/hexa-hover.md",
    "cloak/hexa-cloak.md",
    "teleport/hexa-teleport.md",
    "sim/hexa-sim.md",
    "warp/hexa-warp.md",
    "wormhole/hexa-wormhole.md",
    "dimjump/hexa-dimjump.md",
    "dimuse/hexa-dimuse.md",
    "docs/meta-closure-nav/meta-closure-nav.md",
    "docs/meta-closure-nav/sf-novel-six.md",
    "docs/meta-closure-nav/README.md",
]

