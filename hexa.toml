# grav/hover/cloak/teleport/sim — 5 propulsion sub-axis docs (atlas pattern)
# warp/wormhole/dimjump/dimuse  — 4 in-tree Stage-4~7 substrate spec docs (medium-integration 2026-05-07)
# verify/                — runnable invariant audits (lattice + stages_cross_doc + stages_falsifier)
[modules]
hexa = [
    "ufo/module/ufo_nexus_scan.hexa",
    "verify/lattice_check.hexa",
    "verify/stages_cross_doc.hexa",
    "verify/stages_falsifier.hexa",
