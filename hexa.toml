# hexa.toml — hexa-ufo standalone package manifest
#
# Spec: shared/hexa-lang/hexa-toml-spec.json (version 1.0.0)
# Distribution target: hx install hexa-ufo
# Provenance: extracted from n6-architecture/domains/sf-ufo/ on 2026-05-06
#             (n6-arch SHA c0f1f570; sister to hexa-bio standalone)

[package]
name = "hexa-ufo"
version = "1.0.0"
entry = "cli/hexa-ufo.hexa"
description = "UFO Substrate Atlas + 7-stage Propulsion (grav/hover/cloak/teleport/sim). alien_index 6 to 500 — 1890-LOC main atlas + 6 propulsion verbs. Stage-1 Meissner / Stage-2 fusion / Stage-3 antimatter wired against public substrates; Stages 4-7 (warp / wormhole / dimension / dimensional-use) are TBD (no public substrate exists yet)."
license = "MIT"
authors = ["박민우 <nerve011235@gmail.com>"]
repository = "https://github.com/need-singularity/hexa-ufo"
homepage = "https://github.com/need-singularity/hexa-ufo"
readme = "README.md"
keywords = ["ufo", "propulsion", "alien-index", "alcubierre", "wormhole", "meissner", "fusion", "antimatter", "n6-invariant"]
categories = ["science-fiction", "speculative-engineering", "propulsion", "atlas"]

[lib]
# Library entry — atlas browser placeholder (read-only).
entry = "ufo/module/ufo_nexus_scan.hexa"

[[bin]]
name = "hexa-ufo"
path = "cli/hexa-ufo.hexa"

[test]
runner = "hexa"
files = [
    "tests/test_atlas_consistency.hexa",
]

# ── hx install hook ───────────────────────────────────────
# install.hexa runs under hx package manager (hexa-lang) at install time.
# Phases: pre   → none required (pure-text atlas + stub modules).
#         post  → quick atlas-consistency selftest (warn-only, not a blocker).
[scripts]
install = "install.hexa"

# ── Modules manifest (1 atlas + 6 propulsion verbs) ───────
# ufo        — main atlas (1890 LOC narrative + 484-tier L(k)=24^(k-15) table)
# grav/hover/cloak/teleport/sim — 5 propulsion sub-axis docs
# (Stages 4~7 of the propulsion stack ship as TBD placeholders — see README §Status.)
[modules]
hexa = [
    "ufo/module/ufo_nexus_scan.hexa",
]
docs = [
    "ufo/doc/hexa-ufo.md",
    "ufo/doc/warp-dimension-design.md",
    "grav/hexa-grav.md",
    "hover/hexa-hover.md",
    "cloak/hexa-cloak.md",
    "teleport/hexa-teleport.md",
    "sim/hexa-sim.md",
]

# ── Dependencies ───────────────────────────────────────────
# Pure-hexa atlas browser. Zero Python deps. Zero network.
[dependencies]
hexa-lang = ">=1.0.0"

# ── Closure provenance ────────────────────────────────────
# v1.0.0 closure: 1 atlas (1890 LOC) + 6 verbs (5 documented sub-axes +
# 1 propulsion-stage table). Stages 4~7 of the propulsion stack are TBD —
# no public substrate (warp / wormhole / dimensional jump / dimensional use)
# has been independently verified.
[closure]
verbs_total = 6
verbs_wired_atlas = 6
propulsion_stages_total = 7
propulsion_stages_substrate_grounded = 3
propulsion_stages_tbd = 4
verdict = "ATLAS_PASS_PROPULSION_PARTIAL"
extracted_from = "n6-architecture/domains/sf-ufo/ @ 2026-05-06 (SHA c0f1f570)"

# ── Scope honesty ─────────────────────────────────────────
[scope]
honest_scope = "ATLAS browser + propulsion-stage substrate cross-link table. Stage-1 (Meissner) / Stage-2 (fusion) / Stage-3 (antimatter) cross-link to need-singularity sister repos. Stages 4-7 (warp / wormhole / dimension-jump / dimension-use) ship as TBD — no public substrate exists yet."
not_scope = ["actual flight hardware", "prototype build", "FAA / aerospace certification", "warp-bubble engineering (Stage-4: TBD substrate)", "wormhole stabilization (Stage-5: TBD substrate)", "dimensional-jump KK-tower (Stage-6/7: TBD substrate)"]
alien_index_caveat = "alien_index 6 to 500 spans known engineering (RT-SC, fusion, antimatter — all with sister repos) through speculative physics (Alcubierre warp, Morris-Thorne wormhole) through pure conjecture (Calabi-Yau navigation). The 484-tier L(k)=24^(k-15) lattice is an arithmetic indexing convention, not an empirical claim."

# ── Cost profile ──────────────────────────────────────────
[cost]
mac_local_default = "$0 (pure hexa atlas browser; no network, no compute)"
selftest = "$0 (verb count + lattice arithmetic sanity check; <1s wall-clock)"
